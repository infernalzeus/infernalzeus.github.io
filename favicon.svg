<svg viewBox="0 0 32 32" width="256" height="256" xmlns="http://www.w3.org/2000/svg">

  <!-- rounded dark background -->
  <rect width="32" height="32" rx="5" fill="#080c28"/>

  <!-- cube faces -->
  <!-- top face -->
  <polygon fill="#131d6a" points="16,3 29,10 16,17 3,10"/>
  <!-- left face -->
  <polygon fill="#060920" points="3,10 16,17 16,28 3,21"/>
  <!-- right face -->
  <polygon fill="#0d1450" points="29,10 16,17 16,28 29,21"/>

  <!-- outer silhouette edges — green glow -->
  <polygon fill="none" stroke="#00e676" stroke-width="0.9" stroke-opacity="0.75"
    points="16,3 29,10 29,21 16,28 3,21 3,10"/>

  <!-- inner structural edges — dimmer -->
  <line x1="3"  y1="10" x2="16" y2="17" stroke="#00e676" stroke-width="0.65" stroke-opacity="0.35"/>
  <line x1="29" y1="10" x2="16" y2="17" stroke="#00e676" stroke-width="0.65" stroke-opacity="0.35"/>
  <line x1="16" y1="17" x2="16" y2="28" stroke="#00e676" stroke-width="0.65" stroke-opacity="0.35"/>

  <!--
    Z on RIGHT face  — projected onto the parallelogram (16,17)→(29,10)→(29,21)→(16,28)
    TL(u=.15,v=.2)→TR(u=.85,v=.2)→BL(u=.15,v=.8)→BR(u=.85,v=.8)
    x = 16 + 13u,  y = 17 − 7u + 11v
  -->
  <polyline fill="none" stroke="#00e676" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"
    points="17.95,18.15 27.05,13.25 17.95,24.75 27.05,19.85"/>

  <!--
    Z on LEFT face — projected onto the parallelogram (3,10)→(16,17)→(16,28)→(3,21)
    TL(u=.15,v=.2)→TR(u=.85,v=.2)→BL(u=.15,v=.8)→BR(u=.85,v=.8)
    x = 3 + 13u,   y = 10 + 7u + 11v
  -->
  <polyline fill="none" stroke="#00e676" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"
    points="4.95,13.25 14.05,18.15 4.95,19.85 14.05,24.75"/>

</svg>
