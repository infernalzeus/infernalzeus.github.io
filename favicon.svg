<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#080c28" rx="3"/>

  <!-- Face fills (3-depth shading) -->
  <polygon points="16,2 30,10 16,18 2,10" fill="#0d1050"/>
  <polygon points="2,10 16,18 16,30 2,22"  fill="#06091f"/>
  <polygon points="16,18 30,10 30,22 16,30" fill="#0a0e3c"/>

  <!-- Top face grid (4 internal lines: 2 each direction) -->
  <line x1="6.7"  y1="7.3"  x2="20.7" y2="15.3" stroke="#00e676" stroke-width="0.55" opacity="0.85"/>
  <line x1="11.3" y1="4.7"  x2="25.3" y2="12.7" stroke="#00e676" stroke-width="0.55" opacity="0.85"/>
  <line x1="6.7"  y1="12.7" x2="20.7" y2="4.7"  stroke="#00e676" stroke-width="0.55" opacity="0.85"/>
  <line x1="11.3" y1="15.3" x2="25.3" y2="7.3"  stroke="#00e676" stroke-width="0.55" opacity="0.85"/>

  <!-- Left face grid -->
  <line x1="2"    y1="14"   x2="16"   y2="22"   stroke="#00e676" stroke-width="0.55" opacity="0.85"/>
  <line x1="2"    y1="18"   x2="16"   y2="26"   stroke="#00e676" stroke-width="0.55" opacity="0.85"/>
  <line x1="6.7"  y1="12.7" x2="6.7"  y2="24.7" stroke="#00e676" stroke-width="0.55" opacity="0.85"/>
  <line x1="11.3" y1="15.3" x2="11.3" y2="27.3" stroke="#00e676" stroke-width="0.55" opacity="0.85"/>

  <!-- Right face grid -->
  <line x1="30"   y1="14"   x2="16"   y2="22"   stroke="#00e676" stroke-width="0.55" opacity="0.85"/>
  <line x1="30"   y1="18"   x2="16"   y2="26"   stroke="#00e676" stroke-width="0.55" opacity="0.85"/>
  <line x1="25.3" y1="12.7" x2="25.3" y2="24.7" stroke="#00e676" stroke-width="0.55" opacity="0.85"/>
  <line x1="20.7" y1="15.3" x2="20.7" y2="27.3" stroke="#00e676" stroke-width="0.55" opacity="0.85"/>

  <!-- Outer cube border -->
  <polygon points="16,2 30,10 30,22 16,30 2,22 2,10" fill="none" stroke="#00e676" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Inner face edges (meeting at centre vertex 16,18) -->
  <line x1="2"  y1="10" x2="16" y2="18" stroke="#00e676" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="30" y1="10" x2="16" y2="18" stroke="#00e676" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="18" x2="16" y2="30" stroke="#00e676" stroke-width="1.2" stroke-linecap="round"/>
</svg>
